<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" aria-label="Snake game">
        <header class="panel__header">
          <div>
            <p class="eyebrow">Classic Snake</p>
            <h1>Snake</h1>
          </div>
          <div class="panel__actions">
            <button class="button" id="pause-button" type="button">Pause</button>
            <button class="button" id="restart-button" type="button">Restart</button>
          </div>
        </header>

        <div class="status" aria-live="polite">
          <p>Score: <strong id="score">0</strong></p>
          <p id="game-status">Use arrow keys or WASD to start.</p>
        </div>

        <div
          id="game-board"
          class="board"
          role="grid"
          aria-label="Snake board"
        ></div>

        <div class="controls" aria-label="Touch controls">
          <button class="button button--control" data-direction="up" type="button">
            Up
          </button>
          <div class="controls__row">
            <button class="button button--control" data-direction="left" type="button">
              Left
            </button>
            <button class="button button--control" data-direction="down" type="button">
              Down
            </button>
            <button class="button button--control" data-direction="right" type="button">
              Right
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/snake-game.js"></script>
  </body>
</html>
